apiVersion: v1
kind: Pod
metadata:
  name: anti-affinity-demo
spec:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: "app"
              operator: In
              values:
              - affinity-demo
          topologyKey: "kubernetes.io/hostname"
  containers:
  - name: app
    image: nginx
